<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Arent's Soundboard</title>
<style>*,*::before,*::after{box-sizing:border-box}
:root{--bg:#0c0a14;--surface:rgba(255,255,255,.04);--surface-hover:rgba(255,255,255,.08);--border:rgba(255,255,255,.08);--text:#f0eef5;--muted:#8b849c;--accent:#a78bfa;--accent-glow:rgba(167,139,250,.35)}
body{background:var(--bg);background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(120,80,220,.25),transparent),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(236,72,153,.12),transparent);color:var(--text);font-family:system-ui,sans-serif;margin:0;min-height:100vh;padding:20px 16px 32px;touch-action:manipulation}
header{margin:0 auto 12px;text-align:center}
header h1{font-size:clamp(1.4rem,3vw,1.75rem);font-weight:700;letter-spacing:-.02em;margin:0 0 6px}
header p{color:var(--muted);font-size:.85rem;margin:0}
.group{margin:0}
.group+.group{margin-top:4px}
.group details>summary{list-style:none}
.group details>summary::-webkit-details-marker{display:none}
.group-title{align-items:center;color:var(--muted);cursor:pointer;display:flex;font-size:.7rem;font-weight:700;gap:10px;letter-spacing:.12em;margin:18px 0 8px;text-transform:uppercase;user-select:none}
.group-title::before{color:var(--accent);content:"▸";display:inline-block;flex-shrink:0;font-size:.65rem;transition:transform 150ms ease;width:.8em}
.group details[open]>.group-title::before{transform:rotate(90deg)}
.group-title:hover{color:var(--text)}
.group-title::after{background:var(--border);content:"";flex:1;height:1px}
.group-title:focus-visible{border-radius:4px;outline:2px solid var(--accent);outline-offset:2px}
.grid{display:grid;gap:6px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));width:100%}
@media (max-width:540px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{align-items:stretch;appearance:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:inherit;cursor:pointer;display:flex;flex-direction:column;font:inherit;gap:4px;min-height:40px;outline:none;padding:6px 8px;position:relative;text-align:left;transition:background 150ms ease,border-color 150ms ease,transform 150ms ease,box-shadow 150ms ease}
.card-top{align-items:center;display:flex;justify-content:space-between;width:100%}
.card:hover{background:var(--surface-hover);border-color:rgba(167,139,250,.3);transform:translateY(-2px)}
.card:focus-visible{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
.card.playing{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.5);box-shadow:0 0 18px var(--accent-glow);transform:scale(1.02)}
.card-icon{flex-shrink:0;font-size:1.1rem;line-height:1;width:1.25rem}
.card.playing .card-icon{animation:bounce .4s ease}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.2)}70%{transform:scale(.95)}}
.card-title{font-size:.72rem;font-weight:600;line-height:1.2;margin:0;min-width:0}
.key{align-items:center;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:4px;box-shadow:0 1px 0 rgba(0,0,0,.4);color:var(--muted);display:inline-flex;flex-shrink:0;font-family:ui-monospace,monospace;font-size:.6rem;font-weight:600;height:18px;justify-content:center;margin:0;min-width:18px;padding:0 4px;transition:color 150ms ease,border-color 150ms ease}
.card:hover .key,.card.playing .key{border-color:rgba(167,139,250,.4);color:var(--accent)}
.waves{bottom:4px;display:flex;gap:2px;justify-content:center;left:50%;opacity:0;position:absolute;transform:translateX(-50%);transition:opacity 150ms ease}
.card.playing .waves{opacity:1}
.waves span{animation:wave .6s ease-in-out infinite;background:var(--accent);border-radius:2px;display:block;height:10px;width:2px}
.waves span:nth-child(2){animation-delay:.1s}
.waves span:nth-child(3){animation-delay:.2s}
.waves span:nth-child(4){animation-delay:.15s}
@keyframes wave{0%,100%{height:4px;opacity:.5}50%{height:10px;opacity:1}}</style>
</head>

<script>const c=new Map();
function p(el){const k=el.dataset.key;if(!c.has(k))c.set(k,new Audio(el.dataset.sound));const a=c.get(k);a.currentTime=0;a.play();el.classList.add("playing");setTimeout(()=>el.classList.remove("playing"),300)}
document.getElementById("board").addEventListener("click",e=>{const el=e.target.closest(".card");if(el)p(el)});
document.addEventListener("keydown",e=>{if(e.metaKey||e.ctrlKey||e.altKey)return;const el=document.querySelector('.card[data-key="'+e.key.toLowerCase()+'"]');if(el){e.preventDefault();p(el)}});</script>
